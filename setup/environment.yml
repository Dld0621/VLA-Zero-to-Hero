name: embodied-ai
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - numpy
  - scipy
  - matplotlib
  - jupyter
  - pip
  - pip:
    # --- Retargeting / Simulation ---
    - mujoco
    - opencv-python
    - mediapipe
    # --- Deep Learning ---
    - torch>=2.0
    - torchvision
    - transformers
    - datasets
    - accelerate
    - einops
    - timm
    - tokenizers
    # --- RL / World Models ---
    - gymnasium
    - stable-baselines3
    # --- VLA Fine-tuning ---
    - peft
    - bitsandbytes
    - wandb
    # --- Utilities ---
    - tqdm
    - pillow
    - pybullet
